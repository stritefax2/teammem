services:
  postgres:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: teammem
      POSTGRES_PASSWORD: teammem
      POSTGRES_DB: teammem
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U teammem"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
